<script>
const K="94d877b3c2eb44ed8e79f5a14995440e";
const INST={
  "XAU/USD":{sym:"XAU/USD",name:"Or / Gold",dec:2,dot:"dXAU",
    sess:[{s:14.5,e:18}],sl:"14h30–18h00",dxyRole:"optional"},
  "EUR/USD":{sym:"EUR/USD",name:"Euro / Dollar",dec:5,dot:"dEUR",
    sess:[{s:9,e:11},{s:14.5,e:17}],sl:"9h–11h | 14h30–17h",dxyRole:"mandatory"},
  "NAS100":{sym:"QQQ",name:"Nasdaq 100",dec:2,dot:"dNAS",
    sess:[{s:14.5,e:17}],sl:"14h30–17h00 (strict)",dxyRole:"none"}
};

let cur="XAU/USD",md={},ld={},er={},dxyCache=null;

function hNow(){const n=new Date();return n.getHours()+n.getMinutes()/60;}
function inSess(inst){const h=hNow();return inst.sess.some(s=>h>=s.s&&h<s.e);}
function nxtS(inst){
  const h=hNow();
  for(const s of inst.sess){if(h<s.s){const d=s.s-h,hh=Math.floor(d),mm=Math.round((d-hh)*60);return`Dans ${hh}h${mm>0?mm+'min':''}`}}
  const d=24-h+inst.sess[0].s,hh=Math.floor(d),mm=Math.round((d-hh)*60);
  return`Demain dans ${hh}h${mm>0?mm+'min':''}`;
}
function f(v,d){return v!=null?parseFloat(v).toFixed(d):'—';}
function calcVwap(c){let a=0,b=0;for(const x of c){const t=(+x.high+ +x.low+ +x.close)/3,v=+x.volume||1;a+=t*v;b+=v;}return a/b;}
function calcAtr(c,p=10){const s=c.slice(0,Math.min(p,c.length));return s.reduce((a,x)=>a+(+x.high- +x.low),0)/s.length;}
function detectStr(c){
  if(c.length<6)return"RANGE";
  const H=c.map(x=>+x.high),L=c.map(x=>+x.low);
  let hh=0,hl=0,ll=0,lh=0;
  for(let i=1;i<6;i++){if(H[i]>H[i-1])hh++;if(L[i]>L[i-1])hl++;if(L[i]<L[i-1])ll++;if(H[i]<H[i-1])lh++;}
  if(hh>=2&&hl>=2)return"BULLISH";if(ll>=2&&lh>=2)return"BEARISH";return"RANGE";
}

function calcPivots(c){
  if(c.length<10)return null;
  const s=c.slice(1,9);
  const H=Math.max(...s.map(x=>+x.high)),L=Math.min(...s.map(x=>+x.low)),C=+s[0].close;
  const PP=(H+L+C)/3;
  return{PP,R1:2*PP-L,R2:PP+(H-L),S1:2*PP-H,S2:PP-(H-L)};
}

// ─── FILTRE 1 : RR MINIMUM 1.5 ───
function checkRR(entry,sl,tp1){
  const riskDist=Math.abs(entry-sl);
  const rewardDist=Math.abs(tp1-entry);
  if(riskDist===0)return{ok:false,rr:0};
  const rr=rewardDist/riskDist;
  return{ok:rr>=1.5,rr:parseFloat(rr.toFixed(2))};
}

// ─── FILTRE 2 : MARCHÉ FATIGUÉ ───
function checkFatigue(c,V,A){
  const reasons=[];
  // 3 grandes bougies consécutives dans le même sens
  if(c.length>=3){
    const allBull=c.slice(0,3).every(x=>+x.close>+x.open&&Math.abs(+x.close- +x.open)/(+x.high- +x.low)>0.5);
    const allBear=c.slice(0,3).every(x=>+x.close<+x.open&&Math.abs(+x.close- +x.open)/(+x.high- +x.low)>0.5);
    if(allBull)reasons.push("3 grandes bougies haussières consécutives");
    if(allBear)reasons.push("3 grandes bougies baissières consécutives");
  }
  // Prix trop éloigné du VWAP
  const price=+c[0].close;
  const distVwap=Math.abs(price-V)/A;
  if(distVwap>3.0)reasons.push(`Extension forte — Prix à ${distVwap.toFixed(1)}x ATR du VWAP`);
  // Pas de pullback récent
  const recentHighs=c.slice(0,6).map(x=>+x.high);
  const recentLows=c.slice(0,6).map(x=>+x.low);
  const maxHigh=Math.max(...recentHighs),minLow=Math.min(...recentLows);
  const rangeSize=maxHigh-minLow;
  if(rangeSize>A*4&&distVwap>2.5)reasons.push("Mouvement étendu sans pullback récent");
  return{tired:reasons.length>0,reasons};
}

// ─── FILTRE 3 : ESPACE DE MARCHÉ ───
function checkSpace(price,sl,pivots,dir,A){
  const riskDist=Math.abs(price-sl);
  const minReward=riskDist*1.5;
  if(!pivots)return{ok:true,reason:null};
  // Trouver le prochain niveau dans la direction
  const levels=dir==="BUY"
    ?[{v:pivots.R1,n:"R1"},{v:pivots.R2,n:"R2"},{v:pivots.PP,n:"PP"}].filter(l=>l.v>price)
    :[{v:pivots.S1,n:"S1"},{v:pivots.S2,n:"S2"},{v:pivots.PP,n:"PP"}].filter(l=>l.v<price);
  if(levels.length===0)return{ok:true,reason:null};
  const nearest=dir==="BUY"?Math.min(...levels.map(l=>l.v)):Math.max(...levels.map(l=>l.v));
  const space=Math.abs(nearest-price);
  if(space<minReward)return{ok:false,reason:`Espace insuffisant (${f(space,2)}) — Prochain niveau trop proche`};
  return{ok:true,reason:null};
}

// ─── SCORE DE QUALITÉ ───
function calcScore(params){
  const{contextClear,timingOk,spaceOk,cleanSignal,dxyOk,structureOk,fatigued,isFake,validConf,total,rr}=params;
  let pts=0;
  if(contextClear)pts+=2;
  if(timingOk)pts+=2; // timing parfait (session active)
  if(spaceOk)pts+=2;
  if(cleanSignal)pts+=2; // bougie forte / rejet propre
  if(dxyOk)pts+=1;
  if(structureOk)pts+=1;
  if(fatigued)pts-=3;
  if(isFake)pts+=1; // fake breakout = bonus priorité
  const confRatio=validConf/Math.max(total,1);
  if(confRatio>=0.8)pts+=2;
  else if(confRatio>=0.6)pts+=1;
  if(rr>=2.5)pts+=2;
  else if(rr>=2.0)pts+=1;

  if(pts>=10)return"A+";
  if(pts>=7)return"A";
  if(pts>=4)return"B";
  return"C";
}

// ─── BOUGIE ───
function bougieLabel(c){
  const b=Math.abs(+c.close- +c.open),r=+c.high- +c.low;
  if(r===0)return{ok:false,okB:false,l:"❌ Bougie sans amplitude"};
  const ratio=b/r;
  if(ratio>0.55)return{ok:true,okB:true,l:"✅ Bougie forte — Corps dominant"};
  if(ratio>0.45)return{ok:true,okB:true,l:"✅ Bougie propre — Corps > 45%"};
  if(ratio>0.35)return{ok:false,okB:true,l:"🟡 Bougie moyenne — Mèches modérées"};
  return{ok:false,okB:false,l:"❌ Grandes mèches — Indécision"};
}

function volInfo(c){
  if(c.length<6)return"📊 Volume N/A";
  const v=c.map(x=>+x.volume||0);
  const avg=v.slice(2,12).reduce((a,b)=>a+b,0)/Math.min(10,v.length-2);
  if(v[0]>avg*2.0)return"📊 Pic de volume à la cassure ⚡";
  if(v[0]>avg*1.15&&v[0]>=v[1]*0.85)return"📊 Volume progressif croissant";
  if(v[0]>avg*1.05)return"📊 Volume légèrement au-dessus";
  return"📊 Volume faible — Surveiller";
}

function cassureLabel(c,V,dir,pivots){
  const price=+c[0].close,prev=+c[1].close,A=calcAtr(c);
  const rec=c.slice(1,11);
  const rH=Math.max(...rec.map(x=>+x.high)),rL=Math.min(...rec.map(x=>+x.low));
  if(dir==="BUY"){
    if(prev<rH&&price>rH)return{ok:true,okB:true,l:"✅ Cassure Range High en clôture M15"};
    if(pivots&&prev<pivots.R1&&price>pivots.R1)return{ok:true,okB:true,l:"✅ Cassure Pivot R1 en clôture M15"};
    if(pivots&&prev<pivots.PP&&price>pivots.PP)return{ok:true,okB:true,l:"✅ Cassure Pivot PP en clôture M15"};
    if(pivots&&prev<pivots.R2&&price>pivots.R2)return{ok:true,okB:true,l:"✅ Cassure Pivot R2 en clôture M15"};
    if(Math.abs(price-rH)<A*0.6)return{ok:false,okB:true,l:"🟡 Proche Range High — Cassure pas encore clôturée"};
  } else {
    if(prev>rL&&price<rL)return{ok:true,okB:true,l:"✅ Cassure Range Low en clôture M15"};
    if(pivots&&prev>pivots.S1&&price<pivots.S1)return{ok:true,okB:true,l:"✅ Cassure Pivot S1 en clôture M15"};
    if(pivots&&prev>pivots.PP&&price<pivots.PP)return{ok:true,okB:true,l:"✅ Cassure Pivot PP en clôture M15"};
    if(pivots&&prev>pivots.S2&&price<pivots.S2)return{ok:true,okB:true,l:"✅ Cassure Pivot S2 en clôture M15"};
    if(Math.abs(price-rL)<A*0.6)return{ok:false,okB:true,l:"🟡 Proche Range Low — Cassure pas encore clôturée"};
  }
  return{ok:false,okB:false,l:"❌ Pas de cassure de niveau clé"};
}

function analyzeDXY(dxyData,dir,role){
  if(role==="none")return null;
  if(!dxyData||dxyData.length<6){
    return{ok:false,blocks:role==="mandatory",l:role==="mandatory"?"❌ DXY indisponible — Obligatoire EUR/USD":"⚠️ DXY indisponible — Optionnel XAU",str:"N/A",price:null,vwapVal:null,aboveVwap:null};
  }
  const dxyStr=detectStr(dxyData),dxyV=calcVwap(dxyData),dxyP=+dxyData[0].close,above=dxyP>dxyV;
  let ok=false,label="";
  if(dir==="BUY"){
    if(dxyStr==="BEARISH"||!above){ok=true;label=`✅ DXY ${dxyStr==="BEARISH"?"baissier":"sous VWAP"} → Favorable BUY`;}
    else{ok=false;label=`❌ DXY ${dxyStr==="BULLISH"?"haussier":"au-dessus VWAP"} → Défavorable BUY`;}
  } else {
    if(dxyStr==="BULLISH"||above){ok=true;label=`✅ DXY ${dxyStr==="BULLISH"?"haussier":"au-dessus VWAP"} → Favorable SELL`;}
    else{ok=false;label=`❌ DXY faible → Défavorable SELL`;}
  }
  return{ok,blocks:role==="mandatory"&&!ok,l:label,str:dxyStr,price:dxyP,vwapVal:dxyV,aboveVwap:above};
}

// ─── FAKE BREAKOUT ───
function detectFakeBreakout(c,V,pivots){
  if(c.length<5)return null;
  const A=calcAtr(c);
  const rec=c.slice(1,11);
  const rH=Math.max(...rec.map(x=>+x.high)),rL=Math.min(...rec.map(x=>+x.low));
  const price=+c[0].close;

  // Fake bull → SELL
  const fakeBull=+c[1].high>rH&&price<rH-A*0.05;
  // Fake bear → BUY
  const fakeBear=+c[1].low<rL&&price>rL+A*0.05;

  let fakePivBull=false,fakePivBear=false,fakePivLvl="";
  if(pivots){
    if(+c[1].high>pivots.R1&&price<pivots.R1){fakePivBull=true;fakePivLvl="R1";}
    else if(+c[1].high>pivots.PP&&price<pivots.PP){fakePivBull=true;fakePivLvl="PP";}
    if(+c[1].low<pivots.S1&&price>pivots.S1){fakePivBear=true;fakePivLvl="S1";}
    else if(+c[1].low<pivots.PP&&price>pivots.PP){fakePivBear=true;fakePivLvl="PP";}
  }

  if(fakeBull||fakePivBull){
    const dir="SELL";
    const slVal=Math.max(+c[1].high,+c[0].high)+A*0.1;
    const tp1=(rL+rH)/2,tp2=rL;
    const cond=[
      {ok:true,l:"✅ Fausse cassure haussière"+(fakePivBull?" pivot "+fakePivLvl:"")+" — Piège"},
      {ok:true,l:"✅ Rejet immédiat + Réintégration du niveau"},
      {ok:price<V,l:price<V?"✅ Clôture M15 sous le VWAP":"❌ Clôture encore au-dessus du VWAP"},
      {ok:detectStr(c.slice(1))==="BEARISH"||price<V,l:"✅ Structure bascule en baissier"},
    ];
    return{dir,slVal,tp1,tp2,cond,label:fakePivBull?"Pivot "+fakePivLvl+" piégé":"Range High piégé"};
  }
  if(fakeBear||fakePivBear){
    const dir="BUY";
    const slVal=Math.min(+c[1].low,+c[0].low)-A*0.1;
    const tp1=(rL+rH)/2,tp2=rH;
    const cond=[
      {ok:true,l:"✅ Fausse cassure baissière"+(fakePivBear?" pivot "+fakePivLvl:"")+" — Piège"},
      {ok:true,l:"✅ Rejet immédiat + Réintégration du niveau"},
      {ok:price>V,l:price>V?"✅ Clôture M15 au-dessus du VWAP":"❌ Clôture encore sous le VWAP"},
      {ok:detectStr(c.slice(1))==="BULLISH"||price>V,l:"✅ Structure bascule en haussier"},
    ];
    return{dir,slVal,tp1,tp2,cond,label:fakePivBear?"Pivot "+fakePivLvl+" piégé":"Range Low piégé"};
  }
  return null;
}

// ─── SIGNAL PRINCIPAL ───
function generateSignal(c,dxyData,instKey){
  if(!c||c.length<15)return null;
  const inst=INST[instKey];
  const price=+c[0].close,V=calcVwap(c),A=calcAtr(c),S=detectStr(c),pivots=calcPivots(c);
  const on=inSess(inst);

  // FILTRE TEMPOREL STRICT — bloquant
  if(!on)return{grade:"OFF_SESSION",price,V,S,pivots,A,nextSess:nxtS(inst)};

  const fatigue=checkFatigue(c,V,A);

  // ─── SETUP B FAKE BREAKOUT (priorité) ───
  const fb=detectFakeBreakout(c,V,pivots);
  if(fb){
    const dir=fb.dir;
    const dxy=analyzeDXY(dxyData,dir,inst.dxyRole);
    if(!dxy||!dxy.blocks){
      const rrCheck=checkRR(price,fb.slVal,fb.tp1);
      const space=checkSpace(price,fb.slVal,pivots,dir,A);
      if(!rrCheck.ok)return{grade:"NO_RR",price,V,S,pivots,A,rr:rrCheck.rr,reason:"RR insuffisant pour fake breakout"};
      const validConf=fb.cond.filter(x=>x.ok).length;
      const score=calcScore({
        contextClear:validConf>=3,timingOk:on,spaceOk:space.ok,
        cleanSignal:validConf>=3,dxyOk:dxy?dxy.ok:true,
        structureOk:S!=="RANGE",fatigued:fatigue.tired,
        isFake:true,validConf,total:fb.cond.length,rr:rrCheck.rr
      });
      if(score==="C")return{grade:"NOSIG",price,V,S,pivots,A,reason:"Score C — Setup non exploitable"};
      return{
        grade:"B",score,d:dir,isFake:true,label:fb.label,
        cond:fb.cond,validConf,total:fb.cond.length,
        dxy,price,V,S,pivots,A,
        rr:rrCheck.rr,
        sl:fb.slVal,tp1:fb.tp1,tp2:fb.tp2,
        fatigue,space,
        slLabel:"Au-delà de la mèche",
        risk:score==="A+"?"0.10%":score==="A"?"0.05–0.10%":"≤ 0.05%"
      };
    }
  }

  // ─── SETUP A BREAKOUT (si pas de range) ───
  if(S==="RANGE"){
    // En range → priorité fake breakout déjà traité, sinon no signal
    return{grade:"RANGE",price,V,S,pivots,A};
  }

  const dir=+c[0].close>V?"BUY":"SELL";
  const dxy=analyzeDXY(dxyData,dir,inst.dxyRole);
  if(dxy&&dxy.blocks)return{grade:"NOSIG",price,V,S,pivots,A,reason:"DXY obligatoire non aligné"};

  const bougie=bougieLabel(c[0]);
  if(!bougie.okB)return{grade:"NOSIG",price,V,S,pivots,A,reason:"Grandes mèches — Filtre annulation"};
  if(fatigue.tired)return{grade:"FATIGUE",price,V,S,pivots,A,fatigue};

  const cassure=cassureLabel(c,V,dir,pivots);
  const structure={ok:S===(dir==="BUY"?"BULLISH":"BEARISH"),l:S===(dir==="BUY"?"BULLISH":"BEARISH")?(dir==="BUY"?"✅ Structure HH/HL — Tendance haussière":"✅ Structure LH/LL — Tendance baissière"):"❌ Structure non confirmée"};
  const vwapConf={ok:(+c[0].close>V)===(dir==="BUY"),l:(+c[0].close>V)===(dir==="BUY")?"✅ VWAP aligné — Sens du trade":"❌ VWAP contre le trade"};
  const pullback={ok:false,okB:true,l:"🟡 Attends clôture M15 de confirmation"};

  // Pullback ou clôture forte
  const isBull=+c[0].close>+c[0].open;
  if((dir==="BUY"&&isBull&&bougie.ok)||(dir==="SELL"&&!isBull&&bougie.ok)){
    pullback.ok=true;pullback.l="✅ Clôture forte dans le sens du trade";
  } else if((+c[1].close>+c[1].open)!==(+c[0].close>+c[0].open)){
    pullback.ok=true;pullback.l="✅ Pullback propre — Retest du niveau";
  }

  const cf=[cassure,vwapConf,structure,bougie,pullback];
  const validA=cf.filter(x=>x.ok).length;
  const validB=cf.filter(x=>x.ok||x.okB).length;

  if(validA<2&&validB<2)return{grade:"NOSIG",price,V,S,pivots,A,reason:"Moins de 2 confirmations"};

  // Calcul SL/TP
  const slDist=A*1.5;
  const sl=dir==="BUY"?price-slDist:price+slDist;
  const tp1=dir==="BUY"?price+slDist*1.5:price-slDist*1.5;
  const tp2=dir==="BUY"?price+slDist*2.5:price-slDist*2.5;

  // FILTRE RR obligatoire
  const rrCheck=checkRR(price,sl,tp1);
  if(!rrCheck.ok)return{grade:"NO_RR",price,V,S,pivots,A,rr:rrCheck.rr,reason:"RR insuffisant"};

  // FILTRE espace
  const space=checkSpace(price,sl,pivots,dir,A);

  const grade=validA>=3?"A":"B";
  const score=calcScore({
    contextClear:validA>=3,timingOk:on,spaceOk:space.ok,
    cleanSignal:bougie.ok&&cassure.ok,dxyOk:dxy?dxy.ok:true,
    structureOk:structure.ok,fatigued:fatigue.tired,
    isFake:false,validConf:validA,total:cf.length,rr:rrCheck.rr
  });

  if(score==="C")return{grade:"NOSIG",price,V,S,pivots,A,reason:"Score C — Setup non exploitable"};

  return{
    grade,score,d:dir,isFake:false,
    cf,validA,validB,total:cf.length,
    dxy,price,V,S,pivots,A,
    rr:rrCheck.rr,sl,tp1,tp2,
    fatigue,space,
    risk:score==="A+"?"0.10%":score==="A"?"0.05–0.10%":"≤ 0.05%"
  };
}

async function fetchDXY(){
  try{const r=await fetch(`/api/proxy?symbol=DXY&interval=15min&outputsize=15&apikey=${K}`);const j=await r.json();if(j.values)dxyCache=j.values;}
  catch(e){dxyCache=null;}
}
async function loadInstrument(k){
  const inst=INST[k];ld[k]=true;
  try{
    const r=await fetch(`/api/proxy?symbol=${encodeURIComponent(inst.sym)}&interval=15min&outputsize=30&apikey=${K}`);
    const j=await r.json();
    if(j.status==="error"||!j.values)throw new Error(j.message||"Erreur API");
    const c=j.values;
    md[k]={price:+c[0].close,V:calcVwap(c),S:detectStr(c),A:calcAtr(c),sig:generateSignal(c,dxyCache,k),candles:c};
    er[k]=null;
    document.getElementById(inst.dot).style.background=inSess(inst)?"#22c55e":"#ef4444";
  }catch(e){er[k]=e.message;}
  ld[k]=false;
  document.getElementById('upd').textContent=`Màj: ${new Date().toLocaleTimeString('fr-BE')} · Auto 3min`;
  if(k===cur)render();
}
async function loadAll(){
  await fetchDXY();
  for(const k of Object.keys(INST)){await loadInstrument(k);await new Promise(r=>setTimeout(r,700));}
}
function setTab(k){cur=k;document.querySelectorAll('.tab').forEach((t,i)=>{t.classList.toggle('active',Object.keys(INST)[i]===k);});render();}

function scoreColor(s){return s==="A+"?"#22c55e":s==="A"?"#22c55e":s==="B"?"#5b9bd5":"#ef4444";}
function scoreBadge(s){return s==="A+"?"badge-aplus":s==="A"?"badge-a":s==="B"?"badge-b":"";}

function render(){
  const inst=INST[cur],d=md[cur],dec=inst.dec;
  const on=d?inSess(inst):false;
  const G="#22c55e",R="#ef4444",O="#f59e0b",B="#7ec8ff",D="#3a5878";

  let h=`<div class="sess ${on?"on":"off"}">
    <div>
      <div class="lbl">Session ${inst.name}</div>
      <div style="font-weight:700;color:${on?G:R};font-size:12px">${on?"🟢 ACTIVE — TRADING AUTORISÉ":`🔴 FERMÉE — ${nxtS(inst)}`}</div>
    </div>
    <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px">
      <div style="font-size:9px;color:${D}">${inst.sl}</div>
      <button class="btn" onclick="loadInstrument('${cur}')">${ld[cur]?"↻ ...":"↻ Actualiser"}</button>
    </div>
  </div>`;

  if(er[cur])h+=`<div class="err">⚠️ ${er[cur]}</div>`;
  if(ld[cur]&&!d)h+=`<div style="text-align:center;padding:40px;color:${D}">↻ Connexion...</div>`;

  if(d){
    const sig=d.sig;
    const sc=d.S==="BULLISH"?G:d.S==="BEARISH"?R:O;
    const vc=d.price>d.V?G:R;

    h+=`<div class="g3">
      <div class="card"><div class="lbl">Prix M15</div><div style="font-size:16px;font-weight:700;color:${B}">${f(d.price,dec)}</div></div>
      <div class="card"><div class="lbl">VWAP</div><div style="font-size:16px;font-weight:700;color:${vc}">${f(d.V,dec)}</div><div style="font-size:9px;color:${vc};margin-top:1px">${d.price>d.V?"▲ BUY":"▼ SELL"}</div></div>
      <div class="card"><div class="lbl">Structure</div><div style="font-size:16px;font-weight:700;color:${sc}">${d.S==="BULLISH"?"HH/HL":d.S==="BEARISH"?"LH/LL":"RANGE"}</div></div>
    </div>`;

    // DXY
    if(sig&&sig.dxy&&inst.dxyRole!=="none"){
      const dxy=sig.dxy;
      h+=`<div class="dxy-box">
        <div class="lbl" style="margin-bottom:5px;color:#5b9bd5">💵 DXY — ${inst.dxyRole==="mandatory"?"OBLIGATOIRE":"Optionnel"}</div>
        <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:5px">
          <div style="background:rgba(0,0,0,.2);border-radius:4px;padding:2px 7px;font-size:10px;color:${dxy.str==="BULLISH"?R:dxy.str==="BEARISH"?G:O}">${dxy.str==="BULLISH"?"📈 Haussier":dxy.str==="BEARISH"?"📉 Baissier":"↔ Range"}</div>
          <div style="background:rgba(0,0,0,.2);border-radius:4px;padding:2px 7px;font-size:10px;color:${dxy.aboveVwap?R:G}">VWAP: ${dxy.aboveVwap?"Au-dessus":"En dessous"}</div>
          ${dxy.price?`<div style="background:rgba(0,0,0,.2);border-radius:4px;padding:2px 7px;font-size:10px;color:${D}">${dxy.price.toFixed(2)}</div>`:""}
        </div>
        <div style="font-size:11px;color:${dxy.ok?G:dxy.blocks?R:O}">${dxy.l}</div>
      </div>`;
    }

    // Pivots
    if(sig&&sig.pivots){
      const pv=sig.pivots,price=d.price,A=d.A;
      h+=`<div class="pivot-box">
        <div class="lbl" style="margin-bottom:5px">📍 Pivots M15</div>
        ${[{v:pv.R2,n:"R2",c:R},{v:pv.R1,n:"R1",c:O},{v:pv.PP,n:"PP",c:B},{v:pv.S1,n:"S1",c:O},{v:pv.S2,n:"S2",c:G}].map((l,i)=>{
          const near=Math.abs(price-l.v)<A*0.8;
          return`<div class="prow" style="border-bottom:${i===4?"none":"1px solid #0e1c30"};${near?"background:rgba(91,155,213,.08);border-radius:4px;padding:3px 5px":""}">
            <span style="color:${l.c};font-weight:700">${l.n}${near?" ◀":""}</span>
            <span style="color:${near?B:D}">${f(l.v,dec)}</span>
          </div>`;
        }).join('')}
      </div>`;
    }

    // États sans signal
    if(!sig||sig.grade==="OFF_SESSION"){
      h+=`<div class="nosig"><div style="font-size:28px;margin-bottom:7px">🕐</div><div style="color:${D};font-size:13px;font-weight:700">Session fermée</div><div style="color:#1a2e4a;font-size:10px;margin-top:5px">${sig?sig.nextSess:nxtS(inst)}</div></div>`;
    } else if(sig.grade==="RANGE"){
      h+=`<div style="background:rgba(245,158,11,.08);border:1px solid ${O};border-radius:10px;padding:12px;margin-bottom:10px;text-align:center">
        <div style="color:${O};font-size:13px;font-weight:700">↔ RANGE — Priorité Setup B</div>
        ${cur==="XAU/USD"?`<div style="color:${D};font-size:10px;margin-top:4px">Attends une fausse cassure ou switche EUR/USD</div>`:""}
      </div>`;
    } else if(sig.grade==="FATIGUE"){
      h+=`<div class="block-box">
        <div style="font-size:12px;font-weight:700;color:${R};margin-bottom:5px">⛔ MARCHÉ FATIGUÉ</div>
        ${sig.fatigue.reasons.map(r=>`<div style="font-size:11px;color:${O};margin:2px 0">• ${r}</div>`).join('')}
        <div style="font-size:10px;color:${D};margin-top:5px">Attends un pullback avant d'entrer</div>
      </div>`;
    } else if(sig.grade==="NO_RR"){
      h+=`<div class="block-box">
        <div style="font-size:12px;font-weight:700;color:${R};margin-bottom:5px">⛔ RR INSUFFISANT — ${sig.rr}:1</div>
        <div style="font-size:11px;color:${O}">RR minimum 1.5 obligatoire</div>
        <div style="font-size:10px;color:${D};margin-top:4px">${sig.reason}</div>
      </div>`;
    } else if(sig.grade==="NOSIG"){
      h+=`<div class="nosig"><div style="font-size:28px;margin-bottom:7px">⏳</div><div style="color:${D};font-size:13px;font-weight:700">Aucun setup valide</div><div style="color:#1a2e4a;font-size:10px;margin-top:4px">${sig.reason||"Conditions insuffisantes"}</div></div>`;
    } else if(sig&&(sig.grade==="A"||sig.grade==="B")){
      const s=sig,buy=s.d==="BUY",isA=s.grade==="A";
      const dc=buy?G:R;
      const scoreC=scoreColor(s.score);
      const confs=s.cond||s.cf||[];

      // Score box
      h+=`<div class="score-box" style="background:${s.score==="A+"?"rgba(34,197,94,.08)":s.score==="A"?"rgba(34,197,94,.05)":s.score==="B"?"rgba(91,155,213,.08)":"rgba(239,68,68,.08)"};border:1px solid ${scoreC}">
        <div style="text-align:center;min-width:50px">
          <div style="font-size:28px;font-weight:700;color:${scoreC}">${s.score}</div>
          <div style="font-size:8px;color:${D};margin-top:1px">QUALITÉ</div>
        </div>
        <div>
          <div style="font-size:10px;color:${scoreC};font-weight:700">${s.score==="A+"?"Setup optimal — Timing parfait":s.score==="A"?"Bon setup — Légère imperfection":"Setup acceptable — Contexte moyen"}</div>
          <div style="font-size:10px;color:${D};margin-top:2px">💰 Risque conseillé : <span style="color:${scoreC};font-weight:700">${s.risk}</span></div>
          <div style="font-size:10px;color:${D};margin-top:1px">RR calculé : <span style="color:${B}">${s.rr}:1</span>${!s.space.ok?` · <span style="color:${O}">⚠️ Espace limité</span>`:""}</div>
        </div>
      </div>`;

      const borderC=isA?dc:"#5b9bd5";
      const bgC=isA?(buy?"rgba(34,197,94,.07)":"rgba(239,68,68,.07)"):"rgba(91,155,213,.07)";

      h+=`<div class="sig-box" style="background:${bgC};border:2px solid ${borderC}">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px">
          <div>
            <span class="badge ${scoreBadge(s.score)}">${s.isFake?"🔵 SETUP B — FAKE BREAKOUT":isA?"✅ SETUP A — BREAKOUT":"🟡 SETUP B — BREAKOUT"}</span>
            <div style="font-size:24px;font-weight:700;color:${s.isFake?"#5b9bd5":isA?dc:O}">${buy?"⬆ BUY":"⬇ SELL"}</div>
            <div style="font-size:10px;color:${D};margin-top:2px">${s.isFake?s.label:s.validA+"/"+(s.total||5)+" confirmations"} · Score ${s.score}</div>
          </div>
          <div style="background:${on?"rgba(34,197,94,.15)":"rgba(239,68,68,.15)"};border:1px solid ${on?G:R};border-radius:7px;padding:4px 8px;font-size:9px;color:${on?G:R}">${on?"✅ En session":"⚠️ Hors session"}</div>
        </div>

        <div class="g3" style="margin-bottom:8px">
          <div style="background:#080c14;border-radius:7px;padding:8px;text-align:center">
            <div class="lbl">Entrée</div><div style="font-size:14px;font-weight:700;color:${B}">${f(s.price,dec)}</div>
          </div>
          <div style="background:#080c14;border-radius:7px;padding:8px;text-align:center">
            <div class="lbl" style="color:${R}">Stop Loss</div>
            <div style="font-size:14px;font-weight:700;color:${R}">${f(s.sl,dec)}</div>
            <div style="font-size:8px;color:${D};margin-top:1px">${s.isFake?"Mèche +ATR":"Structure ATR"}</div>
          </div>
          <div style="background:#080c14;border-radius:7px;padding:8px;text-align:center">
            <div class="lbl" style="color:${G}">TP1 — 50%</div>
            <div style="font-size:14px;font-weight:700;color:${G}">${f(s.tp1,dec)}</div>
            <div style="font-size:8px;color:${D};margin-top:1px">${s.isFake?"Milieu range":"RR 1.5"}</div>
          </div>
        </div>
        <div style="background:#080c14;border-radius:7px;padding:7px;text-align:center;margin-bottom:10px">
          <div class="lbl" style="color:#5b9bd5">TP2 — Runner</div>
          <div style="font-size:14px;font-weight:700;color:#5b9bd5">${f(s.tp2,dec)}</div>
          <div style="font-size:8px;color:${D};margin-top:1px">${s.isFake?"Niveau opposé":"SL → BE après TP1"}</div>
        </div>

        <div class="lbl" style="margin-bottom:4px">Conditions</div>
        ${confs.map(c=>{const col=c.ok?G:c.l.startsWith("🟡")?O:c.l.startsWith("📊")?D:R;return`<div class="conf" style="color:${col}">${c.l}</div>`;}).join('')}
        ${s.dxy&&inst.dxyRole!=="none"?`<div class="conf" style="color:${s.dxy.ok?G:s.dxy.blocks?R:O}">${s.dxy.l}</div>`:""}
        <div class="conf" style="color:${D};border:none">${md[cur]?volInfo(md[cur].candles||[]):""}</div>

        ${!on?`<div class="warn">⚠️ Signal hors session — Ne pas exécuter</div>`:""}
        ${s.isFake?`<div class="tip-b">🔵 Fake Breakout — Priorité élevée · SL au-delà de la mèche · Confirme réintégration sur TradingView</div>`:
          s.score==="A+"?`<div class="tip">⭐ Setup A+ — SL EN PREMIER · TP1 50% puis runner avec BE</div>`:
          s.score==="A"?`<div class="tip">✅ Setup A — SL EN PREMIER · TP1 50% puis runner avec BE</div>`:
          `<div class="tip-warn">🟡 Setup B — Confirme sur TradingView · Risque réduit ≤ 0.05%</div>`
        }
      </div>`;
    }
  }

  h+=`<div class="rules"><div class="lbl">Règles Top One Trader</div><div class="rg">
    <div>⭐ A+ → 0.10%</div><div>✅ A → 0.05–0.10%</div>
    <div>🟡 B → ≤ 0.05%</div><div>🔴 SL en premier</div>
    <div>✂️ TP1 50% RR1.5</div><div>🔁 Runner → BE</div>
    <div>⏰ 1 trade/jour</div><div>⛔ RR < 1.5 = pas de trade</div>
  </div></div>`;

  document.getElementById('body').innerHTML=h;
}

setInterval(()=>{document.getElementById('clk').textContent=new Date().toLocaleTimeString('fr-BE');},1000);
loadAll();
setInterval(loadAll,180000);
</script>
